<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Simulator Values</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#070a14;
  --panel:#0f1426;
  --card:#141a33;
  --accent:#7c6cff;
  --accent-soft:rgba(124,108,255,.25);
  --text:#eef1ff;
  --muted:#9aa2c7;
}

*{box-sizing:border-box;font-family:Inter,system-ui}

body{
  margin:0;
  background:
    radial-gradient(circle at 50% -20%,#242b55 0%,transparent 60%),
    radial-gradient(circle at bottom,#11162e,transparent 60%),
    var(--bg);
  color:var(--text);
}

/* TOP BAR */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 26px;
  background:rgba(10,14,30,.6);
  backdrop-filter:blur(10px);
  border-bottom:1px solid rgba(255,255,255,.06);
}
.logo{
  font-weight:700;
  letter-spacing:.4px;
}
.nav a{
  color:#dfe3ff;
  margin:0 14px;
  text-decoration:none;
  font-size:14px;
  opacity:.85;
}
.nav a:hover{opacity:1}
.nav i{margin-right:6px}

.discord{
  background:linear-gradient(135deg,#5865F2,#7c6cff);
  padding:8px 16px;
  border-radius:12px;
  color:#fff;
  text-decoration:none;
  font-weight:600;
  box-shadow:0 0 25px rgba(124,108,255,.45);
}
.discord i{margin-right:6px}

/* HERO */
.hero{
  text-align:center;
  padding:80px 20px 35px;
}
.hero h1{
  font-size:42px;
  margin:0;
  background:linear-gradient(90deg,#fff,#b7bdff);
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}
.hero p{
  color:var(--muted);
  margin-top:10px;
  font-size:15px;
}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin:28px 20px;
}
.tab{
  padding:9px 20px;
  border-radius:999px;
  font-size:13px;
  cursor:pointer;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.08);
  color:#cfd5ff;
  transition:.25s;
}
.tab:hover{
  background:rgba(124,108,255,.25);
}
.tab.active{
  background:var(--accent);
  color:#000;
  font-weight:600;
  box-shadow:0 0 20px var(--accent-soft);
}

/* SEARCH */
.search{
  max-width:720px;
  margin:0 auto 35px;
}
.search input{
  width:100%;
  padding:15px 20px;
  border-radius:16px;
  border:1px solid rgba(255,255,255,.08);
  background:rgba(15,20,40,.8);
  color:#fff;
  font-size:14px;
}
.search input::placeholder{color:#8e95c9}

/* GRID */
.grid{
  max-width:1350px;
  margin:auto;
  padding:0 24px 70px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:22px;
}

/* PET CARD */
.pet{
  background:
    linear-gradient(180deg,#1a2144,#121733);
  border-radius:20px;
  padding:14px;
  border:1px solid rgba(255,255,255,.06);
  box-shadow:0 18px 50px rgba(0,0,0,.55);
  transition:.35s;
  position:relative;
  overflow:hidden;
}
.pet::before{
  content:"";
  position:absolute;
  inset:0;
  background:radial-gradient(circle at top,rgba(124,108,255,.25),transparent 60%);
  opacity:0;
  transition:.35s;
}
.pet:hover::before{opacity:1}
.pet:hover{
  transform:translateY(-6px) scale(1.015);
  box-shadow:0 30px 70px rgba(0,0,0,.8);
}

.pet img{
  width:100%;
  border-radius:14px;
}
.pet h3{
  text-align:center;
  margin:12px 0 8px;
  font-size:15px;
  font-weight:600;
}
.meta{
  font-size:12px;
  color:var(--muted);
  line-height:1.7;
  text-align:center;
}

/* FOOTER */
footer{
  text-align:center;
  padding:35px 20px;
  font-size:12px;
  color:#7f86b8;
  opacity:.8;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">Tap Sim Values</div>
  <div class="nav">
    <a href="#"><i class="fa-solid fa-house"></i>Home</a>
    <a href="#"><i class="fa-solid fa-list"></i>Value List</a>
  </div>
  <a class="discord" href="https://discord.gg/tapsim" target="_blank">
    <i class="fa-brands fa-discord"></i>Discord
  </a>
</div>

<div class="hero">
  <h1>Tap Simulator Value List</h1>
  <p>Community driven • Accurate Tap Simulator pet values</p>
</div>

<div class="tabs" id="tabs">
  <div class="tab active" data-cat="all">All</div>
</div>

<div class="search">
  <input id="search" placeholder="Search pets...">
</div>

<div class="grid" id="grid"></div>

<footer>
  DISCLAIMER: Serials & mutations affect values drastically<br>
  O/C = Owners Choice • N/A = Not Available
</footer>

<script>
let pets=[];
let activeCategory="all";

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(data=>{
  pets=data;
  buildTabs();
  render();
});

function buildTabs(){
  const tabs=document.getElementById("tabs");
  const cats=[...new Set(pets.map(p=>p.category))];

  cats.forEach(c=>{
    const t=document.createElement("div");
    t.className="tab";
    t.textContent=formatCat(c);
    t.onclick=()=>setCat(c,t);
    tabs.appendChild(t);
  });
}

function formatCat(c){
  return c.replace("secret1","Secret I")
          .replace("secret2","Secret II")
          .replace(/_/g," ")
          .toUpperCase();
}

function setCat(c,el){
  activeCategory=c;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
}

document.getElementById("search").oninput=render;

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  pets.filter(p=>{
    return (activeCategory==="all"||p.category===activeCategory)
      && p.name.toLowerCase().includes(q);
  }).forEach(p=>{
    grid.innerHTML+=`
      <div class="pet">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div class="meta">
          💎 Normal: ${p.values?.normal ?? "N/A"}<br>
          ⭐ Golden: ${p.values?.golden ?? "N/A"}<br>
          🌈 Rainbow: ${p.values?.rainbow ?? "N/A"}
        </div>
      </div>`;
  });
}
</script>

</body>
</html>
