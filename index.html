<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Simulator Value List</title>
<style>
* { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
body { margin:0; background: radial-gradient(circle at top, #1a1a2e, #0f0f1a); color: #eaeaff; }
header { padding:20px 40px; display:flex; justify-content:space-between; align-items:center; background: rgba(0,0,0,0.35); backdrop-filter: blur(8px); }
header h1 { font-size:22px; color: #b88cff; }
.search-bar { width:100%; max-width:500px; margin:30px auto; }
.search-bar input { width:100%; padding:14px 18px; border-radius:14px; border:none; background:#151528; color:white; outline:none; }
.filters { display:flex; justify-content:center; gap:14px; flex-wrap:wrap; margin-bottom:30px; }
.filters button { padding:10px 18px; border-radius:12px; border:none; background:#1d1d35; color:#ccc; cursor:pointer; transition: all .2s; }
.filters button.active, .filters button:hover { background: linear-gradient(135deg, #8c52ff, #5f2cff); color:white; }
.grid { display:grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap:26px; padding:0 40px 60px; }
.card { background: linear-gradient(145deg, #1e1e2f, #141421); border-radius:18px; padding:16px; box-shadow:0 0 25px rgba(140,82,255,0.25); transition: transform .25s, box-shadow .25s; }
.card:hover { transform:translateY(-6px) scale(1.03); box-shadow:0 0 45px rgba(140,82,255,0.55); }
.card img { width:100%; border-radius:14px; margin-bottom:12px; filter: drop-shadow(0 0 12px rgba(140,82,255,0.6)); }
.card h3 { margin:6px 0; font-size:16px; color:#ffffff; }
.stat { font-size:14px; margin-top:4px; display:flex; justify-content:space-between; }
.Normal Value { color:#57ff8a; }
.Golden Value { color:#b88cff; }
.Rainbow Value { color:#FF0000; }
footer { text-align:center; padding:20px; opacity:.5; font-size:13px; }
</style>
</head>
<body>
<header>
<h1>Tap Simulator Value List</h1>
</header>
<div class="search-bar">
<input type="text" placeholder="Search pet...">
</div>
<div class="filters">
<button class="active">All</button>
<button>News</button>
<button>Mythics</button>
<button>Secret I</button>
<button>Secret II</button>
<button>Leaderboard Pets</button>
<button>Exclusives</button>
<button>Eggs</button>
</div>
<section class="grid" id="petGrid">
<!-- Pets will be generated by JS -->
</section>
<footer></footer>
<script>
// Čia lengvai gali pridėti/pakeisti savo pet'us
const pets = [
  {
    name: "Frost Queen",
    category: "Secret I",
    Normal Value: "25",
    Golden Value:
    Rainbow Value:
    image: "https://lh3.googleusercontent.com/sitesv/AAzXCkfeok38AQTYZr1C3nGlAL4rQiyRCd05cQZRVuk2MmRgitEBkXPsUZlQdeIB8UsHocbd52_3JxpPxy4mXAO-DIAZNIYalZIxI7U1VndV0vx_xkRYDyg3Je0hv0nPP09fzHyorUOICqwMRI0qFSMZJcxbkACTydI-NZYPS8BxIDJzlnL-UK2nPGZmLgcVu2iXjJpV6cKt38GXDg4-F_5i0sybuztsxDHz3Y54t_M=w1280/300x300?text=Huge+Cat"
  },

];

// Funkcija generuoja korteles
function displayPets(list) {
  const grid = document.getElementById('petGrid');
  grid.innerHTML = '';
  list.forEach(pet => {
    const card = document.createElement('div');
    card.classList.add('card');
    card.dataset.category = pet.category;
    card.innerHTML = `
      <img src='${pet.image}'>
      <h3>${pet.name}</h3>
      <div class='stat'><span>Value</span><span class='value'>${pet.value}</span></div>
      <div class='stat'><span>Demand</span><span class='demand'>${pet.demand} / 10</span></div>
    `;
    grid.appendChild(card);
  });
}

displayPets(pets);

// Search funkcija
const searchInput = document.querySelector('.search-bar input');
searchInput.addEventListener('input', () => {
  const value = searchInput.value.toLowerCase();
  displayPets(pets.filter(p => p.name.toLowerCase().includes(value)));
});

// Filter mygtukai
const filterButtons = document.querySelectorAll('.filters button');
filterButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    filterButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    const filter = btn.innerText.toLowerCase();
    if(filter === 'all') {
      displayPets(pets);
    } else {
      displayPets(pets.filter(p => p.category === filter));
    }
  });
});
</script>
</body>
</html>
