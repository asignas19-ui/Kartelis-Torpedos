<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tap Simulator Values</title>

<style>
body {
  margin:0;
  font-family:"Segoe UI", Tahoma, sans-serif;
  background: linear-gradient(135deg,#0b1324,#1c2541,#3a506b);
  color:white;
}

/* ===== HEADER ===== */
.top-header {
  background: rgba(15,23,45,0.95);
  padding:18px 20px;
  box-shadow:0 4px 20px rgba(0,0,0,0.4);
  position:sticky;
  top:0;
  z-index:1000;
  border-bottom:2px solid #5865f2;
}
.header-content {
  max-width:1400px;
  margin:auto;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:14px;
}
.left-header {
  display:flex;
  align-items:center;
  gap:12px;
  flex-wrap:wrap;
}
h1 {
  margin:0;
  font-size:26px;
  font-weight:800;
}
.nav-btn {
  background:#11172d;
  border:none;
  color:white;
  padding:8px 16px;
  border-radius:999px;
  font-weight:600;
  cursor:pointer;
}
.nav-btn:hover { background:#1c254a; }

.discord-btn {
  background:linear-gradient(135deg,#5865f2,#4752c4);
  color:white;
  text-decoration:none;
  padding:10px 18px;
  border-radius:999px;
  font-weight:700;
  box-shadow:0 4px 15px rgba(0,0,0,0.3);
}

/* ===== CONTAINER ===== */
.container {
  max-width:1400px;
  margin:auto;
  padding:20px;
}

/* ===== FILTERS ===== */
.filters {
  display:flex;
  flex-direction:column;
  gap:10px;
  margin-bottom:16px;
}
.filter-btn {
  background:#121a35;
  border:1px solid #27305a;
  color:white;
  padding:12px;
  border-radius:999px;
  cursor:pointer;
}
.filter-btn.active {
  background:#5865f2;
}

/* ===== SEARCH ===== */
.search-box input {
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:none;
  background:#121a35;
  color:white;
}

/* ===== GRID ===== */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:16px;
}

/* ===== CARD ===== */
.card {
  background:#0f172d;
  border-radius:18px;
  padding:14px;
  box-shadow:0 8px 25px rgba(0,0,0,0.4);
}
.card img {
  width:100%;
  border-radius:14px;
}
.pet-name {
  text-align:center;
  font-weight:700;
  margin:10px 0;
  color:#7ffcff;
}

/* ===== VALUES ===== */
.value-row {
  display:grid;
  grid-template-columns:1fr auto;
  align-items:center;
  font-size:14px;
  margin:4px 0;
}
.value-amount {
  display:flex;
  align-items:baseline;
  gap:6px;
  min-width:90px;
  justify-content:flex-end;
  font-weight:600;
}
.token-icon {
  width:16px;
  height:16px;
  position:relative;
  top:2px; /* Discord style */
}

/* ===== FOOTER ===== */
footer {
  text-align:center;
  padding:24px;
  font-size:12px;
  opacity:0.6;
}

/* ===== MOBILE FIX ===== */
@media (max-width:768px){
  h1 { font-size:22px; text-align:center; width:100%; }
  .header-content {
    flex-direction:column;
    align-items:center;
  }
  .left-header {
    justify-content:center;
  }
  .discord-btn {
    padding:8px 16px;
    font-size:13px;
    margin-top:6px;
  }
}
</style>
</head>

<body>

<header class="top-header">
  <div class="header-content">
    <div class="left-header">
      <h1>Tap Simulator Values</h1>
      <button class="nav-btn" data-target="homeContent">Home</button>
      <button class="nav-btn" data-target="petsContent">Pets</button>
    </div>
    <a class="discord-btn" href="https://discord.gg/tapsim" target="_blank">Join Discord</a>
  </div>
</header>

<div class="container">

<div id="homeContent">
  <p>Welcome to Tap Simulator Values 🔥</p>
</div>

<div id="petsContent" style="display:none;">
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="secret">Secret Pets</button>
    <button class="filter-btn" data-filter="exclusive">Exclusive Pets</button>
    <button class="filter-btn" data-filter="mythic">Mythic</button>
    <button class="filter-btn" data-filter="limited">Limited</button>
  </div>

  <div class="search-box">
    <input id="searchInput" placeholder="Search pets...">
  </div>

  <div class="grid" id="petsGrid"></div>
</div>

</div>

<footer>© 2026 Tap Simulator Values — Fan-made</footer>

<script>
const TOKEN_ICON="https://cdn.discordapp.com/emojis/1437069603913076840.webp?size=32";
let pets=[];

const home=document.getElementById("homeContent");
const petsPage=document.getElementById("petsContent");
document.querySelectorAll(".nav-btn").forEach(btn=>{
  btn.onclick=()=>{
    home.style.display=btn.dataset.target==="homeContent"?"block":"none";
    petsPage.style.display=btn.dataset.target==="petsContent"?"block":"none";
  }
});

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(d=>{pets=d; renderPets();});

function renderPets(){
  const grid=document.getElementById("petsGrid");
  grid.innerHTML="";
  pets.forEach(p=>{
    grid.innerHTML+=`
    <div class="card">
      <img src="${p.image}">
      <div class="pet-name">${p.name}</div>
      <div class="value-row"><span>💎 Normal</span>
        <span class="value-amount"><span>${p.values.normal}</span><img class="token-icon" src="${TOKEN_ICON}"></span>
      </div>
      <div class="value-row"><span>✨ Golden</span>
        <span class="value-amount"><span>${p.values.golden}</span><img class="token-icon" src="${TOKEN_ICON}"></span>
      </div>
      <div class="value-row"><span>🌈 Rainbow</span>
        <span class="value-amount"><span>${p.values.rainbow}</span><img class="token-icon" src="${TOKEN_ICON}"></span>
      </div>
    </div>`;
  });
}
</script>

</body>
</html>
