<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tap Simulator Values</title>

<style>
body {
  margin: 0;
  font-family: "Segoe UI", Tahoma, sans-serif;
  background: linear-gradient(135deg, #0b1324, #1c2541, #3a506b);
  color: white;
}

/* ===== HEADER ===== */
.top-header {
  background: rgba(15,23,45,0.95);
  padding: 18px 24px;
  position: sticky;
  top: 0;
  z-index: 1000;
  border-bottom: 2px solid #5865f2;
}

.header-content {
  max-width: 1400px;
  margin: auto;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.left-header {
  display: flex;
  align-items: center;
  gap: 14px;
}

.header-content h1 {
  margin: 0;
  font-size: 26px;
  font-weight: 800;
}

.nav-btn {
  background: rgba(0,0,0,0.45);
  color: white;
  border: none;
  padding: 8px 14px;
  border-radius: 999px;
  font-weight: 600;
  font-size: 13px;
  cursor: pointer;
}

.discord-btn {
  background: linear-gradient(135deg,#5865f2,#4752c4);
  color: white;
  text-decoration: none;
  padding: 8px 16px;
  border-radius: 999px;
  font-weight: 700;
  font-size: 13px;
}

/* ===== CONTAINER ===== */
.container {
  padding: 24px;
  max-width: 1400px;
  margin: auto;
}

/* ===== FILTERS ===== */
.filters {
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:16px;
}

.filter-btn {
  background:#141c33;
  border:1px solid #263055;
  color:white;
  padding:7px 14px;
  border-radius:999px;
  cursor:pointer;
  font-size:13px;
}

.filter-btn.active {
  background:#5865f2;
  border-color:#5865f2;
}

.search-box input {
  width:100%;
  max-width:380px;
  padding:12px 14px;
  border-radius:14px;
  border:none;
  background:#141c33;
  color:white;
}

/* ===== PET GRID ===== */
.grid {
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}

.card {
  background:#0f172d;
  border-radius:18px;
  padding:14px;
}

.card img {
  width:100%;
  border-radius:14px;
  margin-bottom:10px;
}

.pet-name {
  font-size:16px;
  font-weight:700;
  margin-bottom:10px;
  text-align:center;
  color:#7ffcff;
}

/* ===== VALUE ROWS ===== */
.value-row {
  display:flex;
  justify-content:space-between;
  align-items:center;
  font-size:14px;
  margin-bottom:6px;
}

.value-amount {
  display:inline-flex;
  align-items:center;
  gap:6px;
  font-weight:600;
  line-height:1;
}

.value-amount img {
  width:16px;
  height:16px;
  vertical-align:middle;
  transform: translateY(1px); /* PERFECT ALIGN */
}

/* ===== MOBILE ===== */
@media (max-width:768px) {

  .header-content {
    flex-direction: column;
    align-items: center;
    gap: 8px;
  }

  .left-header {
    justify-content: center;
  }

  .discord-btn {
    padding: 6px 14px;
    font-size: 12px;
    margin-top: 4px;
  }

  .grid {
    grid-template-columns: 1fr;
  }
}

footer {
  text-align:center;
  padding:24px;
  color:#8fa2ff;
  font-size:12px;
}
</style>
</head>

<body>

<header class="top-header">
  <div class="header-content">
    <div class="left-header">
      <h1>Tap Simulator Values</h1>
      <button class="nav-btn" data-target="homeContent">Home</button>
      <button class="nav-btn" data-target="petsContent">Pets</button>
    </div>
    <a href="https://discord.gg/tapsim" target="_blank" class="discord-btn">Join Discord</a>
  </div>
</header>

<div class="container">

<div id="homeContent">
  <h2>⚡ Recent Update</h2>
  <ul>
    <li>New Areas</li>
    <li>New Pets</li>
    <li>New Secrets</li>
  </ul>
</div>

<div id="petsContent" style="display:none;">
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="secret">Secret</button>
    <button class="filter-btn" data-filter="exclusive">Exclusive</button>
  </div>

  <div class="search-box">
    <input type="text" id="searchInput" placeholder="Search pets...">
  </div>

  <div class="grid" id="petsGrid"></div>
</div>

</div>

<footer>© 2026 Tap Simulator Values</footer>

<script>
const TOKEN_ICON = "https://cdn.discordapp.com/emojis/1437069603913076840.webp?size=32";
let pets = [];

const petsGrid = document.getElementById("petsGrid");

fetch('https://asignas19-ui.github.io/value-list/pets.json?' + Date.now())
.then(res => res.json())
.then(data => {
  pets = data;
  renderPets();
});

function renderPets(){
  petsGrid.innerHTML = "";
  pets.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${p.image}">
      <div class="pet-name">${p.name}</div>
      <div class="value-row">
        <span>💎 Normal</span>
        <span class="value-amount">${p.values.normal}<img src="${TOKEN_ICON}"></span>
      </div>
      <div class="value-row">
        <span>✨ Golden</span>
        <span class="value-amount">${p.values.golden}<img src="${TOKEN_ICON}"></span>
      </div>
      <div class="value-row">
        <span>🌈 Rainbow</span>
        <span class="value-amount">${p.values.rainbow}<img src="${TOKEN_ICON}"></span>
      </div>
    `;
    petsGrid.appendChild(card);
  });
}
</script>

</body>
</html>
