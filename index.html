<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Simulator Value List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
*{box-sizing:border-box;font-family:Arial,Segoe UI}
body{
  margin:0;
  background:#0b3a57;
  color:#eaf3ff;
}

/* HEADER */
header{
  background:#062f47;
  padding:20px;
  text-align:center;
}
header h1{margin:0;font-size:30px}

/* NAV */
.nav{
  display:flex;
  justify-content:center;
  gap:10px;
  margin-top:15px;
}
.nav button{
  background:#0e4a6d;
  color:white;
  border:none;
  padding:8px 18px;
  border-radius:20px;
  cursor:pointer;
}
.nav button.active{
  background:#19b5ff;
}

/* CATEGORY TABS */
.tabs{
  display:flex;
  justify-content:center;
  flex-wrap:wrap;
  gap:10px;
  margin:20px;
}
.tabs button{
  background:#0e4a6d;
  border:none;
  color:white;
  padding:6px 14px;
  border-radius:14px;
  cursor:pointer;
}
.tabs button.active{
  background:#19b5ff;
}

/* PET GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
  gap:15px;
  padding:20px;
  max-width:1100px;
  margin:auto;
}

.card{
  background:#0f4d73;
  border-radius:12px;
  padding:10px;
  text-align:center;
}
.card img{
  width:90px;
  height:90px;
  object-fit:contain;
}
.card h3{
  margin:8px 0 6px;
  font-size:15px;
}
.values{
  font-size:13px;
  line-height:1.4;
}

/* FOOTER */
footer{
  text-align:center;
  font-size:12px;
  opacity:.8;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h1>Tap Simulator Value List</h1>

  <div class="nav">
    <button class="active">Home</button>
    <button>Value List</button>
  </div>
</header>

<div class="tabs">
  <button class="active" onclick="showAll()">All</button>
  <button onclick="filterPets('secret1')">Secret I</button>
  <button onclick="filterPets('secret2')">Secret II</button>
  <button onclick="filterPets('exclusive')">Exclusive</button>
  <button onclick="filterPets('mythic')">Mythic</button>
  <button onclick="filterPets('leaderboard')">Leaderboard</button>
</div>

<div id="pets" class="grid"></div>

<footer>
  DISCLAIMER: Serials can affect values drastically.<br>
  O/C = Owners Choice · N/A = Not Available
</footer>

<script>
const PETS_URL = "https://asignas19-ui.github.io/value-list/pets.json";
let allPets = [];

fetch(PETS_URL)
  .then(res => res.json())
  .then(data => {
    allPets = data;
    renderPets(allPets);
  })
  .catch(() => {
    document.getElementById("pets").innerHTML = "Failed to load pets.";
  });

function renderPets(list){
  const grid = document.getElementById("pets");
  grid.innerHTML = "";

  list.forEach(p => {
    const card = document.createElement("div");
    card.className = "card";
    card.innerHTML = `
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <div class="values">
        Normal: ${p.values.normal}<br>
        Golden: ${p.values.golden}<br>
        Rainbow: ${p.values.rainbow}
      </div>
    `;
    grid.appendChild(card);
  });
}

function clearActive(){
  document.querySelectorAll(".tabs button")
    .forEach(b=>b.classList.remove("active"));
}

function showAll(){
  clearActive();
  event.target.classList.add("active");
  renderPets(allPets);
}

function filterPets(cat){
  clearActive();
  event.target.classList.add("active");
  renderPets(allPets.filter(p => p.category === cat));
}
</script>

</body>
</html>
