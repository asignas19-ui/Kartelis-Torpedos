<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Simulator Values</title>

<style>
/* ================= ROOT ================= */
:root{
  --bg:#0b1324;
  --panel:#0f172d;
  --accent:#5865f2;
  --text:#e5e7eb;
  --muted:#9ca3af;
}

*{box-sizing:border-box}

/* ================= BODY ================= */
body{
  margin:0;
  font-family:"Segoe UI",Tahoma,sans-serif;
  background:radial-gradient(circle at top,#1c2541,var(--bg));
  color:var(--text);
}

/* ================= HEADER ================= */
.top-header{
  background:rgba(15,23,45,0.95);
  border-bottom:1px solid rgba(255,255,255,0.06);
  position:sticky;
  top:0;
  z-index:1000;
}

.header-inner{
  max-width:1400px;
  margin:auto;
  padding:14px 20px;
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
}

/* LEFT */
.header-left{
  display:flex;
  align-items:center;
  gap:12px;
}

.logo{
  width:34px;
  height:34px;
  border-radius:50%;
  background:#5865f2;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
}

/* CENTER */
.header-center{
  text-align:center;
}
.header-center h1{
  margin:0;
  font-size:26px;
  font-weight:800;
}

/* NAV */
.nav{
  margin-top:8px;
  display:flex;
  justify-content:center;
  gap:10px;
}
.nav-btn{
  background:#141c33;
  border:none;
  color:white;
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;
  font-weight:600;
  cursor:pointer;
}
.nav-btn:hover{background:#1e2950}

/* RIGHT */
.header-right{
  display:flex;
  justify-content:flex-end;
}
.discord-btn{
  background:linear-gradient(135deg,#5865f2,#4752c4);
  color:white;
  text-decoration:none;
  padding:8px 16px;
  border-radius:999px;
  font-weight:700;
  font-size:13px;
}

/* ================= CONTAINER ================= */
.container{
  max-width:1400px;
  margin:auto;
  padding:22px;
}

/* ================= FILTERS ================= */
.filters{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  margin-bottom:14px;
}
.filter-btn{
  background:#141c33;
  border:1px solid #263055;
  color:white;
  padding:6px 14px;
  border-radius:999px;
  font-size:13px;
  cursor:pointer;
}
.filter-btn.active{
  background:var(--accent);
  border-color:var(--accent);
}

/* ================= SEARCH ================= */
.search-box{
  max-width:360px;
  margin-bottom:18px;
}
.search-box input{
  width:100%;
  padding:10px 14px;
  border-radius:14px;
  border:none;
  background:#141c33;
  color:white;
}

/* ================= PET GRID ================= */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
  gap:16px;
}

.card{
  background:linear-gradient(180deg,#182145,#0f172d);
  border-radius:16px;
  padding:12px;
  box-shadow:0 8px 22px rgba(0,0,0,0.45);
}
.card img{
  width:100%;
  border-radius:12px;
}
.pet-name{
  margin:8px 0;
  font-weight:700;
  font-size:15px;
  color:#7ffcff;
  text-align:center;
}
.value-row{
  display:flex;
  justify-content:space-between;
  font-size:13px;
  color:var(--muted);
}
.value-amount{
  display:flex;
  align-items:center;
  gap:4px;
}

/* ================= FOOTER ================= */
footer{
  text-align:center;
  padding:24px;
  font-size:12px;
  color:var(--muted);
}

/* ================= MOBILE ================= */
@media(max-width:768px){
.header-inner{
  grid-template-columns:1fr;
  gap:10px;
}
.header-left,.header-right{
  justify-content:center;
}
.header-center h1{font-size:20px}
.nav{margin-top:4px}
.grid{
  grid-template-columns:repeat(2,1fr);
}
}
</style>
</head>

<body>

<header class="top-header">
  <div class="header-inner">

    <div class="header-left">
      <div class="logo">TS</div>
      <a class="discord-btn" href="https://discord.gg/tapsim" target="_blank">Discord</a>
    </div>

    <div class="header-center">
      <h1>Tap Simulator Values</h1>
      <div class="nav">
        <button class="nav-btn" data-target="homeContent">Home</button>
        <button class="nav-btn" data-target="petsContent">Pets</button>
      </div>
    </div>

    <div class="header-right"></div>
  </div>
</header>

<div class="container">

<div id="homeContent">
  <!-- TAVO HOME TURINYS PALIKTAS -->
</div>

<div id="petsContent" style="display:none;">
  <div class="filters">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="secret">Secret</button>
    <button class="filter-btn" data-filter="exclusive">Exclusive</button>
    <button class="filter-btn" data-filter="mythic">Mythic</button>
    <button class="filter-btn" data-filter="limited">Limited</button>
  </div>

  <div class="search-box">
    <input id="searchInput" placeholder="Search pets...">
  </div>

  <div class="grid" id="petsGrid"></div>
</div>

</div>

<footer>© 2026 Tap Simulator Values — Fan-made</footer>

<!-- === TAVO JS PALIKTAS 100 % TAS PATS === -->
<script>
/* tavo JS be pakeitimų */
</script>

</body>
</html>
