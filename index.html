<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Sim Value List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0c0b12;
  --bg2:#151422;
  --card:#1b1a2a;
  --muted:#9aa0c3;
  --accent:#8b5cf6;
}

*{box-sizing:border-box;font-family:Inter,Segoe UI,Arial}
body{
  margin:0;
  background:radial-gradient(circle at top,#17162a,#09080f);
  color:#fff;
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:16px 28px;
}
.logo{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:700;
}
.logo img{
  width:34px;
  height:34px;
  border-radius:50%;
}
.menu{
  display:flex;
  gap:26px;
  font-size:14px;
  color:#d5d7ff;
}
.menu span{cursor:pointer;opacity:.85}
.menu span:hover{opacity:1}

/* HERO */
.hero{
  text-align:center;
  padding:40px 20px 25px;
}
.hero h1{
  font-size:42px;
  margin-bottom:10px;
}
.hero p{
  color:var(--muted);
  max-width:700px;
  margin:auto;
}

/* CATEGORY PILLS */
.pills{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin:30px 0 20px;
}
.pill{
  background:#242338;
  padding:8px 16px;
  border-radius:999px;
  font-size:14px;
  cursor:pointer;
}
.pill.active{
  background:var(--accent);
  color:#000;
}

/* SEARCH */
.searchbar{
  max-width:900px;
  margin:0 auto 30px;
  display:flex;
  gap:10px;
}
.searchbar input{
  flex:1;
  background:#121121;
  border:1px solid #2a2940;
  border-radius:10px;
  padding:12px 16px;
  color:#fff;
  font-size:15px;
}

/* GRID */
.grid{
  max-width:1200px;
  margin:auto;
  padding:0 25px 60px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(230px,1fr));
  gap:22px;
}

/* CARD */
.pet{
  background:linear-gradient(180deg,#1b1a2a,#131221);
  border-radius:16px;
  padding:14px;
  border:1px solid #26253a;
}
.pet img{
  width:100%;
  aspect-ratio:1/1;
  object-fit:contain;
  border-radius:12px;
  background:#0f0e1a;
}
.tag{
  display:inline-block;
  margin:8px 0;
  font-size:12px;
  background:#2a2940;
  padding:3px 8px;
  border-radius:6px;
}
.pet h3{
  margin:6px 0 10px;
  font-size:16px;
}
.pet p{
  margin:4px 0;
  font-size:14px;
  color:#cfd2ff;
}

/* FOOTER */
footer{
  text-align:center;
  color:#7f85b5;
  padding:30px;
  font-size:13px;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="logo">
    <img src="https://i.imgur.com/7QKXK8G.png">
    Tap Sim Values
  </div>
  <div class="menu">
    <span>Trade Ads</span>
    <span>Value List</span>
    <span>Calculator</span>
    <span>Giveaways</span>
    <span>Discord</span>
  </div>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Tap Simulator Value List</h1>
  <p>Browse and track the current market prices for Tap Simulator pets.  
  Values are community-based and updated regularly.</p>
</div>

<!-- CATEGORIES -->
<div class="pills" id="cats"></div>

<!-- SEARCH -->
<div class="searchbar">
  <input id="search" placeholder="Search pets..." oninput="render()">
</div>

<!-- GRID -->
<div class="grid" id="grid"></div>

<footer>
Fan-made Tap Simulator Value List • Data from GitHub JSON
</footer>

<script>
let pets=[],cat="All";

const categories=[
 "All",
 "Secret I",
 "Secret II",
 "Exclusive",
 "Mythic",
 "Leaderboard"
];

const catBox=document.getElementById("cats");
categories.forEach(c=>{
  const d=document.createElement("div");
  d.className="pill"+(c==="All"?" active":"");
  d.innerText=c;
  d.onclick=()=>{
    cat=c;
    document.querySelectorAll(".pill").forEach(p=>p.classList.remove("active"));
    d.classList.add("active");
    render();
  };
  catBox.appendChild(d);
});

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(d=>{pets=d;render()});

function render(){
  const g=document.getElementById("grid");
  const q=document.getElementById("search").value.toLowerCase();
  g.innerHTML="";
  pets.filter(p=>{
    return (cat==="All"||p.category===cat) &&
           p.name.toLowerCase().includes(q);
  }).forEach(p=>{
    g.innerHTML+=`
    <div class="pet">
      <img src="${p.image}">
      <span class="tag">${p.rarity}</span>
      <h3>${p.name}</h3>
      <p>💰 Normal: ${p.normal}</p>
      <p>✨ Golden: ${p.golden}</p>
      <p>🌈 Rainbow: ${p.rainbow}</p>
    </div>`;
  });
}
</script>

</body>
</html>
