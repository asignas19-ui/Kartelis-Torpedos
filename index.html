<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Simulator Values</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{
  margin:0;
  background:linear-gradient(135deg,#0b132b,#1c2541);
  color:#fff;
}

/* HEADER */
header{
  text-align:center;
  padding:16px;
}
nav{
  display:flex;
  justify-content:center;
  gap:10px;
  flex-wrap:wrap;
}
nav button{
  background:#1f3b8a;
  border:none;
  padding:8px 14px;
  border-radius:20px;
  color:#fff;
  cursor:pointer;
}
nav button.active{background:#3a6cff}

/* HOME BLOCKS */
.section{
  max-width:900px;
  margin:16px auto;
  background:#111a33;
  border-radius:16px;
  padding:16px;
}
.section h2{margin-top:0;color:#4fd1ff}

.home-flex{
  display:flex;
  gap:16px;
  flex-wrap:wrap;
}
.home-flex img{
  width:140px;
  border-radius:12px;
}

/* DISCLAIMER */
.disclaimer{
  text-align:center;
  font-size:13px;
  opacity:.8;
  margin:20px;
}

/* TABS */
.tabs{
  display:flex;
  justify-content:center;
  gap:8px;
  flex-wrap:wrap;
}
.tabs button{
  background:#0f1b3d;
  border:none;
  color:#fff;
  padding:6px 12px;
  border-radius:14px;
  cursor:pointer;
}
.tabs button.active{background:#4fd1ff;color:#000}

/* PETS */
#pets{
  max-width:1100px;
  margin:auto;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(160px,1fr));
  gap:16px;
  padding:16px;
}
.pet{
  background:#111a33;
  border-radius:14px;
  padding:10px;
  text-align:center;
}
.pet img{
  width:100%;
  border-radius:10px;
}
.pet h3{margin:8px 0;color:#4fd1ff;font-size:16px}
.pet p{margin:4px 0;font-size:13px}
</style>
</head>

<body>

<header>
  <h1>Tap Simulator Values</h1>
  <nav>
    <button class="active" onclick="showHome()">🏠 Home</button>
    <button onclick="showValues()">💎 Value List</button>
  </nav>
</header>

<!-- HOME -->
<div id="home">
  <div class="section">
    <h2>⚡ Recent Game Update</h2>
    <div class="home-flex">
      <img src="https://lh3.googleusercontent.com/sitesv/AAzXCkehpoKBSGQvorbL0RDMIq7rvkwbVCuTQfcvt7CRkzqQSGP5qd3ksCW4lKDe-34Wv1B03iE0QSP8ANREJqugR2Beu7hGw8PYLmw_xKtEL6SeFLXMu8bD5YZTjGrtZPTrBzPx1erNO4UbjX2ZgcMaeK_GYPNblISPo5LhcESXTw9rItmRyiPiPFU45DbOZgqLacyt1hpkUqfxMI8cdH-_hwMRL0YLsXJrrNsK=w1280">
      <ul>
        <li>Space World ✨</li>
        <li>New Areas 🔮</li>
        <li>New Exclusives 🛒</li>
        <li>35+ New Pets 🐾</li>
      </ul>
    </div>
  </div>

  <div class="section">
    <h2>🎩 Owners</h2>
    <p>• GoldAstro<br>• Hyper</p>
  </div>

  <div class="section">
    <h2>✨ Editors</h2>
    <p>• NotSpeedGuy<br>• Diamondz</p>
  </div>

  <div class="section disclaimer">
    DISCLAIMER: Serials can affect values drastically.<br>
    O/C = Owners Choice · N/A = Not Available
  </div>
</div>

<!-- VALUE LIST -->
<div id="values" style="display:none">
  <div class="tabs">
    <button class="active" onclick="filterCat('all')">All</button>
    <button onclick="filterCat('secret1')">Secret I</button>
    <button onclick="filterCat('secret2')">Secret II</button>
    <button onclick="filterCat('exclusive')">Exclusive</button>
    <button onclick="filterCat('leaderboard')">Leaderboard</button>
    <button onclick="filterCat('mythic')">Mythics</button>
  </div>
  <div id="pets"></div>
</div>

<script>
let allPets=[];

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(data=>{
  allPets=data;
  renderPets(data);
});

function renderPets(list){
  const box=document.getElementById("pets");
  box.innerHTML="";
  list.forEach(p=>{
    box.innerHTML+=`
    <div class="pet">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <p>💎 Normal: ${p.values.normal ?? "N/A"}</p>
      <p>✨ Golden: ${p.values.golden ?? "N/A"}</p>
      <p>🌈 Rainbow: ${p.values.rainbow ?? "N/A"}</p>
    </div>`;
  });
}

function filterCat(cat){
  document.querySelectorAll(".tabs button").forEach(b=>b.classList.remove("active"));
  event.target.classList.add("active");
  if(cat==="all") renderPets(allPets);
  else renderPets(allPets.filter(p=>p.category===cat));
}

function showHome(){
  home.style.display="block";
  values.style.display="none";
}
function showValues(){
  home.style.display="none";
  values.style.display="block";
}
</script>

</body>
</html>
