<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Simulator Values</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Inter,Arial,sans-serif;
  background:radial-gradient(circle at top,#0b132b,#020617);
  color:#e5e7eb;
}
.container{max-width:1200px;margin:auto;padding:24px}
h1{text-align:center;font-size:40px;margin-bottom:10px}

.top-nav{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:30px
}
.top-nav button{
  background:#020617;
  color:#c7d2fe;
  border:none;
  padding:12px 22px;
  border-radius:999px;
  font-size:16px;
  cursor:pointer
}
.top-nav button.active{
  background:#4f46e5;
  color:white
}

.section{
  background:#020617;
  border-radius:18px;
  padding:20px;
  margin-bottom:20px
}

.section h2{
  display:flex;
  align-items:center;
  gap:10px;
  margin-top:0
}

.tabs{
  display:flex;
  gap:10px;
  margin-bottom:14px;
  flex-wrap:wrap
}
.tabs button{
  background:#020617;
  color:#c7d2fe;
  border:none;
  padding:10px 18px;
  border-radius:999px;
  cursor:pointer
}
.tabs button.active{
  background:#4f46e5;
  color:white
}

.search{
  width:100%;
  padding:12px 14px;
  border-radius:14px;
  border:none;
  background:#020617;
  color:white;
  margin-bottom:20px
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(260px,1fr));
  gap:18px
}

.card{
  background:#020617;
  border-radius:18px;
  padding:14px
}
.card img{
  width:100%;
  border-radius:14px
}
.card h3{margin:10px 0 6px}

.price{font-size:14px;line-height:1.5}

.center{text-align:center}

.discord{
  display:inline-block;
  margin-top:20px;
  padding:12px 24px;
  background:#5865F2;
  color:white;
  text-decoration:none;
  border-radius:999px;
  font-weight:600
}
</style>
</head>

<body>
<div class="container">

<h1>Tap Simulator Values</h1>

<div class="top-nav">
  <button id="homeBtn" class="active">🏠 Home</button>
  <button id="valuesBtn">💎 Value List</button>
</div>

<!-- HOME -->
<div id="home">

  <div class="section">
    <h2>📰 News</h2>
    <ul>
      <li>New pets added</li>
      <li>Values updated daily</li>
    </ul>
  </div>

  <div class="section">
    <h2>👑 Owners</h2>
    <ul>
      <li>YourName</li>
    </ul>
  </div>

  <div class="section">
    <h2>✏️ Editors</h2>
    <ul>
      <li>Editor1</li>
      <li>Editor2</li>
    </ul>
  </div>

  <div class="section">
    <h2>⚠️ Disclaimer</h2>
    <p>All values are community based and may change.</p>
  </div>

  <div class="center">
    <a class="discord" href="https://discord.gg/" target="_blank">Join Discord</a>
  </div>

</div>

<!-- VALUES -->
<div id="values" style="display:none">

<div class="tabs">
  <button class="tab active" data-cat="all">All</button>
  <button class="tab" data-cat="secret1">Secret I</button>
  <button class="tab" data-cat="secret2">Secret II</button>
  <button class="tab" data-cat="exclusive">Exclusive</button>
  <button class="tab" data-cat="mythic">Mythic</button>
  <button class="tab" data-cat="limited">Limited</button>
</div>

<input class="search" id="search" placeholder="Search pet...">

<div class="grid" id="petGrid"></div>

</div>
</div>

<script>
const homeBtn=document.getElementById("homeBtn");
const valuesBtn=document.getElementById("valuesBtn");
const home=document.getElementById("home");
const values=document.getElementById("values");

homeBtn.onclick=()=>{
  home.style.display="block";
  values.style.display="none";
  homeBtn.classList.add("active");
  valuesBtn.classList.remove("active");
};
valuesBtn.onclick=()=>{
  home.style.display="none";
  values.style.display="block";
  valuesBtn.classList.add("active");
  homeBtn.classList.remove("active");
};

let pets=[];

fetch("https://asignas19-ui.github.io/value-list/pets.json")
.then(r=>r.json())
.then(data=>{
  pets=data;
  render();
});

function render(filter="all",search=""){
  const grid=document.getElementById("petGrid");
  grid.innerHTML="";
  pets.filter(p=>{
    return (filter==="all"||p.category===filter) &&
           p.name.toLowerCase().includes(search);
  }).forEach(p=>{
    grid.innerHTML+=`
    <div class="card">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <div class="price">
        💎 Normal: ${p.normal}<br>
        ✨ Golden: ${p.golden}<br>
        🌈 Rainbow: ${p.rainbow}
      </div>
    </div>`;
  });
}

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    render(t.dataset.cat,document.getElementById("search").value.toLowerCase());
  };
});

document.getElementById("search").oninput=e=>{
  const cat=document.querySelector(".tab.active").dataset.cat;
  render(cat,e.target.value.toLowerCase());
};
</script>

</body>
</html>
