<!DOCTYPE html><html lang="lt">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tap Simulator Values</title>  <style>
    * { box-sizing: border-box; font-family: Inter, system-ui, sans-serif; }
    body {
      margin: 0;
      background: radial-gradient(circle at top, #0f172a, #020617);
      color: #e5e7eb;
    }

    header {
      padding: 16px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 20px;
      margin: 0;
    }

    .nav {
      display: flex;
      gap: 8px;
    }

    .nav button {
      background: #020617;
      color: #c7d2fe;
      border: none;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 14px;
    }

    .nav button.active {
      background: #4f46e5;
      color: white;
    }

    .tabs {
      display: flex;
      gap: 8px;
      padding: 0 16px;
      overflow-x: auto;
    }

    .tabs button {
      flex: 1;
      min-width: 120px;
      background: #020617;
      color: #c7d2fe;
      border: none;
      padding: 10px;
      border-radius: 14px;
      font-size: 14px;
    }

    .tabs button.active {
      background: linear-gradient(135deg,#6366f1,#4f46e5);
      color: white;
    }

    .search {
      padding: 16px;
    }

    .search input {
      width: 100%;
      padding: 12px 14px;
      border-radius: 14px;
      border: none;
      background: #020617;
      color: white;
    }

    .grid {
      padding: 16px;
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(160px,1fr));
      gap: 14px;
    }

    .card {
      background: #020617;
      border-radius: 16px;
      padding: 12px;
    }

    .card img {
      width: 100%;
      border-radius: 12px;
    }

    .card h3 {
      margin: 8px 0 6px;
      font-size: 15px;
    }

    .token {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 13px;
      margin-top: 4px;
    }

    .token img {
      width: 16px;
      height: 16px;
    }

    .discord-float {
      position: fixed;
      bottom: 16px;
      left: 50%;
      transform: translateX(-50%);
      background: #5865F2;
      color: white;
      padding: 10px 18px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      box-shadow: 0 8px 20px rgba(88,101,242,.4);
      z-index: 999;
    }

    @media(min-width:768px){ .discord-float{display:none;} }
  </style></head>
<body><header>
  <h1>Tap Simulator Values</h1>
  <div class="nav">
    <button class="active">Home</button>
    <button>Pets</button>
  </div>
</header><div class="tabs">
  <button class="tab active" data-tab="all">All</button>
  <button class="tab" data-tab="secret">Secret Pets</button>
  <button class="tab" data-tab="exclusive">Exclusive</button>
  <button class="tab" data-tab="mythic">Mythic</button>
  <button class="tab" data-tab="limited">Limited</button>
</div><div class="search">
  <input type="text" placeholder="Search pets..." id="search" />
</div><div class="grid" id="pets">  <div class="card" data-category="secret">
    <img src="https://i.imgur.com/6XGQZQp.png">
    <h3>Frost Queen</h3>
    <div class="token"><img src="https://i.imgur.com/1Q9Z1Zm.png">25</div>
  </div>  <div class="card" data-category="secret">
    <img src="https://i.imgur.com/4n6p9W5.png">
    <h3>Sakura Dominator</h3>
    <div class="token"><img src="https://i.imgur.com/1Q9Z1Zm.png">40</div>
  </div>  <div class="card" data-category="mythic">
    <img src="https://i.imgur.com/y0X6XkC.png">
    <h3>Divine Dragon</h3>
    <div class="token"><img src="https://i.imgur.com/1Q9Z1Zm.png">30</div>
  </div></div><a class="discord-float" href="https://discord.gg/">Join Discord</a>

<script>
  const tabs = document.querySelectorAll('.tab');
  const cards = document.querySelectorAll('.card');
  const search = document.getElementById('search');

  tabs.forEach(tab => {
    tab.onclick = () => {
      tabs.forEach(t => t.classList.remove('active'));
      tab.classList.add('active');
      const cat = tab.dataset.tab;

      cards.forEach(card => {
        card.style.display = (cat === 'all' || card.dataset.category === cat) ? 'block' : 'none';
      });
    };
  });

  search.oninput = () => {
    const val = search.value.toLowerCase();
    cards.forEach(card => {
      card.style.display = card.innerText.toLowerCase().includes(val) ? 'block' : 'none';
    });
  };
</script></body>
</html>
