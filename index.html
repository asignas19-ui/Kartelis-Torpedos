<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Simulator Values</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --bg:#0b0f1a;
  --card:#141a2e;
  --accent:#6d7cff;
  --text:#e6ebff;
  --muted:#9aa4d6;
}

*{box-sizing:border-box;margin:0;padding:0;font-family:Inter}

body{
  background:radial-gradient(circle at top,#1b2344,var(--bg));
  color:var(--text);
}

/* NAV */
nav{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 22px;
  border-bottom:1px solid rgba(255,255,255,.06);
}

nav a{
  color:var(--muted);
  text-decoration:none;
  margin-left:16px;
  font-size:14px;
}

nav a.active{color:#fff;font-weight:600}

.discord{
  background:var(--accent);
  color:#000;
  padding:6px 14px;
  border-radius:8px;
  font-weight:600;
}

/* HERO */
.hero{
  padding:70px 20px;
  text-align:center;
}

.hero h1{
  font-size:32px;
  margin-bottom:8px;
}

.hero p{
  font-size:14px;
  color:var(--muted);
}

/* HOME BLOCKS */
.home{
  max-width:1100px;
  margin:auto;
  padding:30px 20px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
  gap:20px;
}

.block{
  background:var(--card);
  border-radius:16px;
  padding:18px;
}

.block h3{
  margin-bottom:10px;
}

.block img{
  width:100%;
  border-radius:12px;
}

/* VALUE LIST */
.controls{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin:20px;
}

.controls button{
  background:#121836;
  color:var(--muted);
  border:none;
  padding:6px 14px;
  border-radius:999px;
  cursor:pointer;
}

.controls button.active{
  background:var(--accent);
  color:#000;
  font-weight:600;
}

.search{
  max-width:400px;
  margin:0 auto 20px;
}

.search input{
  width:100%;
  padding:10px 14px;
  border-radius:10px;
  border:none;
  background:#121836;
  color:#fff;
}

.grid{
  max-width:1200px;
  margin:auto;
  padding:0 20px 50px;
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
  gap:18px;
}

.card{
  background:linear-gradient(180deg,#1a2142,#111733);
  border-radius:16px;
  padding:12px;
}

.card img{
  width:100%;
  border-radius:12px;
}

.card h4{
  margin:8px 0 6px;
}

.card p{
  font-size:12px;
  color:var(--muted);
}

/* HIDE */
.hidden{display:none}
</style>
</head>

<body>

<nav>
  <strong>Tap Sim Values</strong>
  <div>
    <a href="#" class="active" onclick="showHome()">Home</a>
    <a href="#" onclick="showValues()">Value List</a>
    <a class="discord" href="https://discord.gg/tapsim" target="_blank">Discord</a>
  </div>
</nav>

<!-- HERO -->
<section class="hero">
  <h1>Tap Simulator Value List</h1>
  <p>Community updated • Accurate values • Tap Simulator</p>
</section>

<!-- HOME -->
<section id="home" class="home">
  <div class="block">
    <h3>📰 Latest News</h3>
    <img src="https://lh3.googleusercontent.com/sitesv/AAzXCkehpoKBSGQvorbL0RDMIq7rvkwbVCuTQfcvt7CRkzqQSGP5qd3ksCW4lKDe-34Wv1B03iE0QSP8ANREJqugR2Beu7hGw8PYLmw_xKtEL6SeFLXMu8bD5YZTjGrtZPTrBzPx1erNO4UbjX2ZgcMaeK_GYPNblISPo5LhcESXTw9rItmRyiPiPFU45DbOZgqLacyt1hpkUqfxMI8cdH-_hwMRL0YLsXJrrNsK=w1280">
  </div>

  <div class="block">
    <h3>🔥 Latest Update</h3>
    <p>• New Area<br>• New Eggs<br>• New Secret Pets</p>
  </div>

  <div class="block">
    <h3>👑 Owners</h3>
    <p style="color:#ff4d4d">GoldAstro</p>
    <p style="color:#4da3ff">Hyper</p>
  </div>

  <div class="block">
    <h3>🛠 Editors</h3>
    <p style="color:#ffe066">NotSpeedGuy</p>
    <p style="color:#6dff8d">Diamondz</p>
  </div>
</section>

<!-- VALUE LIST -->
<section id="values" class="hidden">
  <div class="controls" id="filters"></div>

  <div class="search">
    <input id="search" placeholder="Search pets..." oninput="render()">
  </div>

  <div class="grid" id="grid"></div>
</section>

<script>
const JSON_URL = "https://asignas19-ui.github.io/value-list/pets.json?" + Date.now();
let pets = [];
let currentCategory = "all";

fetch(JSON_URL)
  .then(r=>r.json())
  .then(d=>{
    pets = d;
    buildFilters();
    render();
  });

function buildFilters(){
  const cats = ["all", ...new Set(pets.map(p=>p.category))];
  const f = document.getElementById("filters");
  f.innerHTML="";
  cats.forEach(c=>{
    const b=document.createElement("button");
    b.textContent=c;
    if(c==="all") b.classList.add("active");
    b.onclick=()=>{
      document.querySelectorAll(".controls button").forEach(x=>x.classList.remove("active"));
      b.classList.add("active");
      currentCategory=c;
      render();
    }
    f.appendChild(b);
  });
}

function render(){
  const q = document.getElementById("search").value.toLowerCase();
  const g = document.getElementById("grid");
  g.innerHTML="";

  pets
    .filter(p => (currentCategory==="all"||p.category===currentCategory))
    .filter(p => p.name.toLowerCase().includes(q))
    .forEach(p=>{
      g.innerHTML+=`
        <div class="card">
          <img src="${p.image}">
          <h4>${p.name}</h4>
          <p>Normal: ${p.values.normal ?? "N/A"}</p>
          <p>Golden: ${p.values.golden ?? "N/A"}</p>
          <p>Rainbow: ${p.values.rainbow ?? "N/A"}</p>
        </div>`;
    });
}

function showHome(){
  document.getElementById("home").classList.remove("hidden");
  document.getElementById("values").classList.add("hidden");
}

function showValues(){
  document.getElementById("home").classList.add("hidden");
  document.getElementById("values").classList.remove("hidden");
}
</script>

</body>
</html>
