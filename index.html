<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Simulator Value List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:linear-gradient(180deg,#0a1f33,#061423);
  color:white;
  font-family:Arial,Helvetica,sans-serif;
}

header{
  background:#050f1a;
  padding:15px 30px;
  display:flex;
  align-items:center;
  justify-content:space-between;
}

header h1{
  margin:0;
  font-size:22px;
}

nav{
  display:flex;
  gap:20px;
}

nav a{
  color:#cfe9ff;
  text-decoration:none;
  font-weight:bold;
}

nav a:hover{
  color:#3dbbff;
}

/* CATEGORY TABS */
.categories{
  display:flex;
  justify-content:center;
  gap:12px;
  margin:25px 0;
}

.categories button{
  background:#0b2c44;
  color:white;
  border:none;
  padding:8px 16px;
  border-radius:6px;
  cursor:pointer;
}

.categories button.active{
  background:#1ea7ff;
}

/* PET GRID */
.container{
  max-width:1200px;
  margin:auto;
  padding:20px;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
  gap:18px;
}

.pet{
  background:#0b2c44;
  border-radius:8px;
  padding:12px;
  text-align:center;
}

.pet img{
  width:120px;
  height:120px;
  object-fit:contain;
}

.pet h3{
  margin:10px 0 6px;
  font-size:16px;
}

.values{
  font-size:14px;
  line-height:1.5;
}

footer{
  margin-top:40px;
  text-align:center;
  font-size:13px;
  opacity:.8;
  padding:20px;
}
</style>
</head>

<body>

<header>
  <h1>Tap Simulator Value List</h1>
  <nav>
    <a href="#">Home</a>
    <a href="#">Value List</a>
    <a href="#">Discord</a>
  </nav>
</header>

<div class="categories">
  <button class="active" onclick="showAll()">All</button>
  <button onclick="filterPets('secret1')">Secret I</button>
  <button onclick="filterPets('secret2')">Secret II</button>
  <button onclick="filterPets('exclusive')">Exclusive</button>
  <button onclick="filterPets('mythic')">Mythic</button>
  <button onclick="filterPets('leaderboard')">Leaderboard</button>
</div>

<div class="container">
  <div id="pets" class="grid"></div>
</div>

<footer>
  DISCLAIMER: Serials can affect values drastically.<br>
  O/C = Owners Choice · N/A = Not Available
</footer>

<script>
const URL = "https://asignas19-ui.github.io/value-list/pets.json";
let pets = [];

fetch(URL)
  .then(r => r.json())
  .then(d => {
    pets = d;
    render(pets);
  })
  .catch(()=> {
    document.getElementById("pets").innerHTML = "Failed to load pets.";
  });

function render(list){
  const grid = document.getElementById("pets");
  grid.innerHTML = "";
  list.forEach(p=>{
    grid.innerHTML += `
      <div class="pet">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div class="values">
          ⭐ Normal: ${p.values.normal}<br>
          🟡 Golden: ${p.values.golden}<br>
          🌈 Rainbow: ${p.values.rainbow}
        </div>
      </div>
    `;
  });
}

function clearActive(){
  document.querySelectorAll(".categories button")
    .forEach(b=>b.classList.remove("active"));
}

function showAll(){
  clearActive();
  event.target.classList.add("active");
  render(pets);
}

function filterPets(cat){
  clearActive();
  event.target.classList.add("active");
  render(pets.filter(p=>p.category===cat));
}
</script>

</body>
</html>
