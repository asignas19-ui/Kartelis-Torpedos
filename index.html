<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Simulator Values</title>

<style>
*{box-sizing:border-box;font-family:Arial}
body{
  margin:0;
  background:linear-gradient(135deg,#0b132b,#1c2541);
  color:#fff;
}

/* DISCORD BUTTON */
.discord-btn{
  position:fixed;
  top:14px;
  right:14px;
  background:#5865F2;
  color:#fff;
  padding:8px 14px;
  border-radius:20px;
  text-decoration:none;
  font-weight:bold;
  z-index:999;
}

/* HEADER */
header{text-align:center;padding:16px}
nav{display:flex;justify-content:center;gap:10px;flex-wrap:wrap}
nav button{
  background:#1f3b8a;border:none;padding:8px 14px;
  border-radius:20px;color:#fff;cursor:pointer
}
nav button.active{background:#3a6cff}

/* SECTIONS */
.section{
  max-width:1000px;margin:16px auto;
  background:#111a33;border-radius:16px;padding:16px
}
.section h2{margin-top:0;color:#4fd1ff}

/* HOME */
.home-flex{display:flex;gap:16px;flex-wrap:wrap;align-items:center}
.home-flex img{width:140px;border-radius:12px}

/* TABS */
.tabs{
  display:flex;justify-content:center;
  gap:8px;flex-wrap:wrap;margin:12px 0
}
.tabs button{
  background:#0f1b3d;border:none;color:#fff;
  padding:6px 12px;border-radius:14px;cursor:pointer
}
.tabs button.active{background:#3a6cff}

/* SEARCH */
.search{
  width:100%;padding:10px;
  border-radius:14px;border:none;margin-bottom:14px
}

/* PET GRID */
.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
  gap:14px;
  justify-content:center;
}

/* PET CARD (FIXED SIZE) */
.pet{
  background:#0e1835;
  border-radius:16px;
  padding:10px;
  text-align:center;
  height:260px;
  display:flex;
  flex-direction:column;
  justify-content:space-between;
}
.pet img{
  width:100%;
  height:120px;
  object-fit:cover;
  border-radius:12px;
}
.pet h4{margin:8px 0 4px;font-size:14px}
.pet p{margin:2px;font-size:12px}

/* DISCLAIMER */
.disclaimer{text-align:center;font-size:13px;opacity:.8;margin:20px}
</style>
</head>

<body>

<a class="discord-btn" href="https://discord.gg/tapsim" target="_blank">Discord</a>

<header>
  <h1>Tap Simulator Values</h1>
  <nav>
    <button onclick="showHome()" class="active">🏠 Home</button>
    <button onclick="showValues()">💎 Value List</button>
  </nav>
</header>

<!-- HOME -->
<div id="home" class="section">
  <div class="home-flex">
    <img src="https://lh3.googleusercontent.com/sitesv/AAzXCkehpoKBSGQvorbL0RDMIq7rvkwbVCuTQfcvt7CRkzqQSGP5qd3ksCW4lKDe-34Wv1B03iE0QSP8ANREJqugR2Beu7hGw8PYLmw_xKtEL6SeFLXMu8bD5YZTjGrtZPTrBzPx1erNO4UbjX2ZgcMaeK_GYPNblISPo5LhcESXTw9rItmRyiPiPFU45DbOZgqLacyt1hpkUqfxMI8cdH-_hwMRL0YLsXJrrNsK=w1280">
    <div>
      <h2>⚡ Recent Game Update</h2>
      <p>• Space World ✨</p>
      <p>• New Areas</p>
      <p>• New Exclusives</p>
      <p>• 35+ New Pets 🐾</p>
    </div>
  </div>

  <h2>🎩 Owners</h2>
  <p>• GoldAstro</p>
  <p>• Hyper</p>

  <h2>✨ Editors</h2>
  <p>• NotSpeedGuy</p>
  <p>• Diamondz</p>
</div>

<!-- VALUES -->
<div id="values" class="section" style="display:none">

  <div class="tabs">
    <button class="active" onclick="filter('all')">All</button>
    <button onclick="filter('secret1')">Secret I</button>
    <button onclick="filter('secret2')">Secret II</button>
    <button onclick="filter('exclusive')">Exclusive</button>
    <button onclick="filter('leaderboard')">Leaderboard Pets</button>
    <button onclick="filter('mythic')">Mythics</button>
  </div>

  <input class="search" placeholder="Search pets..." oninput="searchPets(this.value)">

  <div class="grid" id="grid"></div>
</div>

<div class="disclaimer">
  DISCLAIMER: Serials can affect values drastically.<br>
  O/C = Owners Choice • N/A = Not Available
</div>

<script>
let pets=[],current='all',query='';

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json()).then(d=>{pets=d;render()});

function showHome(){
  home.style.display='block';
  values.style.display='none';
}
function showValues(){
  home.style.display='none';
  values.style.display='block';
}

function filter(c){
  current=c;
  document.querySelectorAll('.tabs button')
    .forEach(b=>b.classList.remove('active'));
  event.target.classList.add('active');
  render();
}

function searchPets(q){query=q.toLowerCase();render()}

function render(){
  grid.innerHTML='';
  pets.filter(p=>
    (current==='all'||p.category===current)&&
    p.name.toLowerCase().includes(query)
  ).forEach(p=>{
    grid.innerHTML+=`
    <div class="pet">
      <img src="${p.image}">
      <h4>${p.name}</h4>
      <p>💎 Normal: ${p.values.normal ?? 'N/A'}</p>
      <p>✨ Golden: ${p.values.golden ?? 'N/A'}</p>
      <p>🌈 Rainbow: ${p.values.rainbow ?? 'N/A'}</p>
    </div>`;
  });
}
</script>

</body>
</html>
