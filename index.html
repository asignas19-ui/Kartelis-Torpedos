<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Simulator Value List</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
:root{
  --bg:#0b0d14;
  --panel:#141722;
  --card:#1a1e2e;
  --accent:#7c6cff;
  --text:#f2f4ff;
  --muted:#9aa0c7;
  --chip:#20243a;
}

*{box-sizing:border-box;font-family:Inter,Segoe UI,system-ui}

body{
  margin:0;
  background:radial-gradient(circle at top,#1a1d2b,#0b0d14 60%);
  color:var(--text);
}

/* TOP BAR */
.topbar{
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:14px 24px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.logo{
  font-weight:700;
  letter-spacing:.4px;
}
.nav a{
  color:#dce0ff;
  margin:0 10px;
  text-decoration:none;
  font-size:14px;
}
.discord{
  background:#5865F2;
  padding:8px 14px;
  border-radius:10px;
  color:#fff;
  font-weight:600;
  text-decoration:none;
}

/* HERO */
.hero{
  text-align:center;
  padding:70px 20px 40px;
}
.hero h1{
  font-size:42px;
  margin:0 0 10px;
}
.hero p{
  color:var(--muted);
  max-width:600px;
  margin:auto;
}

/* FILTER CHIPS */
.chips{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
  justify-content:center;
  margin:30px 0 20px;
}
.chip{
  background:var(--chip);
  padding:8px 16px;
  border-radius:999px;
  font-size:13px;
  cursor:pointer;
}
.chip.active{
  background:var(--accent);
  color:#000;
  font-weight:600;
}

/* SEARCH */
.search{
  max-width:700px;
  margin:0 auto 30px;
}
.search input{
  width:100%;
  padding:14px 18px;
  border-radius:12px;
  border:none;
  outline:none;
  background:#15192a;
  color:#fff;
  font-size:14px;
}

/* GRID */
.grid{
  max-width:1300px;
  margin:auto;
  padding:0 20px 60px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}

/* PET CARD */
.pet{
  background:linear-gradient(180deg,#1c2034,#14182a);
  border-radius:16px;
  padding:14px;
  box-shadow:0 15px 40px rgba(0,0,0,.45);
  transition:.2s;
}
.pet:hover{
  transform:translateY(-4px);
}
.pet img{
  width:100%;
  border-radius:12px;
}
.pet h3{
  margin:10px 0 6px;
  font-size:15px;
}
.meta{
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}
.rarity{
  display:inline-block;
  margin-top:6px;
  font-size:11px;
  padding:3px 8px;
  border-radius:8px;
  background:#2b2f4a;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  font-size:12px;
  color:#7f85b6;
}
</style>
</head>

<body>

<div class="topbar">
  <div class="logo">Tap Sim Values</div>
  <div class="nav">
    <a href="#">Home</a>
    <a href="#">Value List</a>
  </div>
  <a class="discord" href="https://discord.gg/tapsim" target="_blank">Discord</a>
</div>

<div class="hero">
  <h1>Tap Simulator Value List</h1>
  <p>Browse and track current Tap Simulator pet values. Updated daily by the community.</p>
</div>

<div class="chips" id="filters">
  <div class="chip active" data-cat="all">All</div>
</div>

<div class="search">
  <input id="search" placeholder="Search pets...">
</div>

<div class="grid" id="grid"></div>

<footer>
  DISCLAIMER: Serials & mutations affect values drastically<br>
  O/C = Owners Choice • N/A = Not Available
</footer>

<script>
let pets=[],category="all";

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(data=>{
  pets=data;
  buildFilters();
  render();
});

function buildFilters(){
  const cats=[...new Set(pets.map(p=>p.category))];
  const wrap=document.getElementById("filters");
  cats.forEach(c=>{
    const d=document.createElement("div");
    d.className="chip";
    d.textContent=c;
    d.dataset.cat=c;
    d.onclick=()=>setCat(c,d);
    wrap.appendChild(d);
  });
}

function setCat(c,el){
  category=c;
  document.querySelectorAll(".chip").forEach(x=>x.classList.remove("active"));
  el.classList.add("active");
  render();
}

document.getElementById("search").oninput=render;

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  pets.filter(p=>{
    return (category==="all"||p.category===category)
      && p.name.toLowerCase().includes(q);
  }).forEach(p=>{
    grid.innerHTML+=`
      <div class="pet">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div class="meta">
          Normal: ${p.normal ?? p.value ?? "N/A"}<br>
          Golden: ${p.golden ?? "N/A"}<br>
          Rainbow: ${p.rainbow ?? "N/A"}
        </div>
        <div class="rarity">${p.rarity || p.category}</div>
      </div>`;
  });
}
</script>

</body>
</html>
