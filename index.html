<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Simulator Values</title>

<style>
body{margin:0;font-family:Segoe UI;background:#0b1324;color:#fff}
header{text-align:center;padding:20px;font-size:26px;font-weight:900;color:#7ffcff}
.container{max-width:1400px;margin:auto;padding:24px}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:18px}
.card{background:#0f172d;border-radius:18px;padding:14px}
.card img{width:100%;border-radius:14px}
.pet-name{text-align:center;font-weight:800;margin:8px 0}
.value-row{display:flex;justify-content:space-between;margin:6px 0}
.normal{color:#cfd4ff}
.golden{color:gold}
.rainbow{background:linear-gradient(45deg,red,orange,yellow,green,cyan,blue,violet);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.price{display:flex;align-items:center;gap:6px;font-weight:800}
.price img{width:16px}

#passwordModal,#adminPanel{
position:fixed;inset:0;background:rgba(0,0,0,0.85);
display:none;justify-content:center;align-items:center;z-index:9999
}
.box{background:#0f172d;padding:20px;border-radius:16px;width:90%;max-width:600px;max-height:90vh;overflow:auto}
input,button{padding:8px;border-radius:8px;border:none}
button{background:#5865f2;color:white;font-weight:700;cursor:pointer}
.admin-row{display:grid;grid-template-columns:1fr 80px 80px 80px 1fr 40px;gap:6px;margin-bottom:8px}
.admin-header{display:flex;justify-content:space-between;align-items:center;font-weight:800;margin-bottom:10px}
</style>
</head>

<body>

<header id="logo">Tap Simulator Values</header>

<div class="container">
  <div class="grid" id="petsGrid"></div>
</div>

<!-- PASSWORD -->
<div id="passwordModal">
  <div class="box">
    <h3>Admin Login</h3>
    <input id="passInput" type="password" placeholder="Password" style="width:100%">
    <button onclick="checkPass()" style="width:100%;margin-top:10px">Login</button>
  </div>
</div>

<!-- ADMIN PANEL -->
<div id="adminPanel">
  <div class="box">
    <div class="admin-header">
      <span>ADMIN PANEL</span>
      <button onclick="addPet()">+ Add Pet</button>
    </div>
    <div id="adminList"></div>
    <button onclick="closeAdmin()" style="width:100%">Save & Close</button>
  </div>
</div>

<script>
const ADMIN_PASSWORD="1234";
const TOKEN_ICON="https://cdn.discordapp.com/emojis/1437069603913076840.webp?size=32";

let pets=JSON.parse(localStorage.getItem("petsData"))||[
 {name:"Frost Queen",image:"https://i.imgur.com/UNt6YPp.png",values:{normal:25,golden:120,rainbow:120}}
];

const grid=document.getElementById("petsGrid");
const adminList=document.getElementById("adminList");

function render(){
grid.innerHTML="";
pets.forEach(p=>{
grid.innerHTML+=`
<div class="card">
<img src="${p.image}">
<div class="pet-name">${p.name}</div>
<div class="value-row"><span class="normal">Normal</span><span class="price">${p.values.normal}<img src="${TOKEN_ICON}"></span></div>
<div class="value-row"><span class="golden">Golden</span><span class="price">${p.values.golden}<img src="${TOKEN_ICON}"></span></div>
<div class="value-row"><span class="rainbow">Rainbow</span><span class="price">${p.values.rainbow}<img src="${TOKEN_ICON}"></span></div>
</div>`;
});
}

function openAdmin(){
adminList.innerHTML="";
pets.forEach((p,i)=>{
adminList.innerHTML+=`
<div class="admin-row">
<input value="${p.name}" onchange="pets[${i}].name=this.value">
<input value="${p.values.normal}" onchange="pets[${i}].values.normal=this.value">
<input value="${p.values.golden}" onchange="pets[${i}].values.golden=this.value">
<input value="${p.values.rainbow}" onchange="pets[${i}].values.rainbow=this.value">
<input value="${p.image}" onchange="pets[${i}].image=this.value">
<button onclick="deletePet(${i})">❌</button>
</div>`;
});
document.getElementById("adminPanel").style.display="flex";
}

function closeAdmin(){
localStorage.setItem("petsData",JSON.stringify(pets));
document.getElementById("adminPanel").style.display="none";
render();
}

function addPet(){
pets.push({name:"New Pet",image:"https://i.imgur.com/UNt6YPp.png",values:{normal:0,golden:0,rainbow:0}});
openAdmin();
}

function deletePet(i){
pets.splice(i,1);
openAdmin();
}

function checkPass(){
if(document.getElementById("passInput").value===ADMIN_PASSWORD){
document.getElementById("passwordModal").style.display="none";
openAdmin();
}
}

document.addEventListener("keydown",e=>{
if(e.ctrlKey&&e.shiftKey&&e.key==="A"){
document.getElementById("passwordModal").style.display="flex";
}
});

// MOBILE: tap logo 5x
let taps=0;
document.getElementById("logo").addEventListener("click",()=>{
taps++;setTimeout(()=>taps=0,600);
if(taps===5){
document.getElementById("passwordModal").style.display="flex";
}
});

render();
</script>

</body>
</html>
