<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Simulator Values</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(180deg,#0b1022,#18264a);
    color:white;
}

/* HEADER */
header{
    padding:20px;
    text-align:center;
    background:#0d1433;
}
header h1{margin:0;font-size:26px;}

.top-buttons{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:10px;
}
.top-buttons button{
    background:#1b2555;
    border:none;
    padding:8px 18px;
    border-radius:18px;
    color:white;
}
.top-buttons .active{background:#5865f2;}

.discord{
    margin-top:8px;
}
.discord a{
    color:#9aa7ff;
    text-decoration:none;
    font-weight:bold;
}

/* TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin:18px 0;
}
.tabs button{
    background:#1a2550;
    border:none;
    padding:8px 14px;
    border-radius:20px;
    color:white;
}
.tabs .active{background:#5865f2;}

/* SEARCH */
.search{
    max-width:320px;
    margin:0 auto 20px;
}
.search input{
    width:100%;
    padding:10px;
    border-radius:14px;
    border:none;
    background:#0e1630;
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
    gap:18px;
    max-width:1200px;
    margin:auto;
    padding:10px;
}

/* CARD */
.card{
    background:#0e1630;
    border-radius:18px;
    padding:14px;
    box-shadow:0 0 18px rgba(88,101,242,0.2);
}

.card img{
    width:100%;
    height:150px;
    object-fit:contain;
    margin-bottom:8px;
}

.name{
    font-weight:bold;
    color:#7ffcff;
    margin-bottom:6px;
    font-size:18px;
}

/* VALUES — KAIP 2 NUOTRAUKOJE */
.values{
    font-size:15px;
    line-height:1.6;
}

.empty{
    grid-column:1/-1;
    text-align:center;
    padding:30px;
    opacity:0.7;
}

@media(max-width:768px){
    .grid{
        grid-template-columns:1fr;
    }
}
</style>
</head>

<body>

<header>
    <h1>Tap Simulator Values</h1>

    <div class="top-buttons">
        <button class="active">🏠 Home</button>
        <button>💎 Value List</button>
    </div>

    <div class="discord">
        <a href="https://discord.gg/tapsim" target="_blank">Discord.gg/tapsim</a>
    </div>
</header>

<div class="tabs">
    <button class="cat active" data-cat="all">All</button>
    <button class="cat" data-cat="secret1">Secret I</button>
    <button class="cat" data-cat="secret2">Secret II</button>
    <button class="cat" data-cat="exclusive">Exclusive</button>
    <button class="cat" data-cat="leaderboard">Leaderboard</button>
    <button class="cat" data-cat="mythic">Mythics</button>
</div>

<div class="search">
    <input id="search" placeholder="Search pets...">
</div>

<div class="grid" id="grid"></div>

<script>
const grid=document.getElementById("grid");
const search=document.getElementById("search");
let pets=[],cat="all";

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(d=>{pets=d;render();});

function render(){
    grid.innerHTML="";
    const list=pets.filter(p=>{
        return (cat==="all"||p.category===cat) &&
        p.name.toLowerCase().includes(search.value.toLowerCase());
    });

    if(list.length===0){
        grid.innerHTML='<div class="empty">No pets here</div>';
        return;
    }

    list.forEach(p=>{
        grid.innerHTML+=`
        <div class="card">
            <img src="${p.image}">
            <div class="name">${p.name}</div>
            <div class="values">
                💎 Normal: ${p.values.normal}<br>
                ✨ Golden: ${p.values.golden}<br>
                🌈 Rainbow: ${p.values.rainbow}
            </div>
        </div>`;
    });
}

document.querySelectorAll(".cat").forEach(b=>{
    b.onclick=()=>{
        document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
        cat=b.dataset.cat;
        render();
    };
});
search.oninput=render;
</script>

</body>
</html>
