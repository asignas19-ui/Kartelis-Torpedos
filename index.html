<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Simulator Values</title>

<style>
body{
    margin:0;
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(180deg,#0b1022,#1a2a4a);
    color:white;
}

/* HEADER */
header{
    background:#0e1533;
    padding:18px;
    text-align:center;
    position:sticky;
    top:0;
    z-index:1000;
}
header h1{margin:0;font-size:26px;}
.nav{
    margin-top:10px;
    display:flex;
    justify-content:center;
    gap:12px;
}
.nav button{
    background:#1b2555;
    border:none;
    padding:8px 16px;
    border-radius:20px;
    color:white;
    cursor:pointer;
}
.nav button.active{background:#5865f2;}

.discord{
    position:absolute;
    right:16px;
    top:22px;
}
.discord a{
    color:white;
    text-decoration:none;
    font-weight:bold;
}

/* CONTAINER */
.container{
    max-width:1400px;
    margin:auto;
    padding:20px;
}

/* CATEGORY TABS */
.tabs{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
    margin-bottom:14px;
}
.tabs button{
    background:#1a2550;
    border:none;
    padding:7px 14px;
    border-radius:18px;
    color:white;
    cursor:pointer;
}
.tabs button.active{background:#5865f2;}

/* SEARCH */
.search{
    max-width:320px;
    margin:0 auto 20px;
}
.search input{
    width:100%;
    padding:10px;
    border-radius:12px;
    border:none;
    background:#0e1630;
    color:white;
}

/* GRID */
.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
    gap:18px;
}

/* CARD */
.card{
    background:#0e1630;
    border-radius:18px;
    padding:12px;
    height:330px;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
    box-shadow:0 0 20px rgba(88,101,242,0.15);
}
.card img{
    width:100%;
    height:140px;
    object-fit:contain;
}
.name{
    font-weight:bold;
    color:#7ffcff;
    margin-top:6px;
}
.val{
    display:flex;
    justify-content:space-between;
    font-size:14px;
    opacity:0.9;
}

/* EMPTY */
.empty{
    grid-column:1/-1;
    background:#0e1630;
    border-radius:18px;
    padding:30px;
    text-align:center;
    opacity:0.8;
}

/* FOOTER */
footer{
    text-align:center;
    padding:18px;
    opacity:0.6;
}

@media(max-width:768px){
    .discord{position:static;margin-top:10px;}
}
</style>
</head>

<body>

<header>
    <h1>Tap Simulator Values</h1>
    <div class="nav">
        <button class="main active" data-tab="values">Value List</button>
    </div>
    <div class="discord">
        <a href="https://discord.gg/tapsim" target="_blank">Discord</a>
    </div>
</header>

<div class="container">

<div class="tabs">
    <button class="cat active" data-cat="all">All</button>
    <button class="cat" data-cat="secret1">Secret I</button>
    <button class="cat" data-cat="secret2">Secret II</button>
    <button class="cat" data-cat="exclusive">Exclusive</button>
    <button class="cat" data-cat="leaderboard">Leaderboard Pets</button>
    <button class="cat" data-cat="mythic">Mythics</button>
</div>

<div class="search">
    <input id="search" placeholder="Search pets...">
</div>

<div class="grid" id="grid"></div>

</div>

<footer>© 2026 Tap Simulator Values</footer>

<script>
const grid=document.getElementById("grid");
const search=document.getElementById("search");
let pets=[],cat="all";

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(d=>{pets=d;render();});

function render(){
    grid.innerHTML="";
    const filtered=pets.filter(p=>{
        return (cat==="all"||p.category===cat) &&
        p.name.toLowerCase().includes(search.value.toLowerCase());
    });

    if(filtered.length===0){
        grid.innerHTML=`<div class="empty">😴 No pets in this category</div>`;
        return;
    }

    filtered.forEach(p=>{
        grid.innerHTML+=`
        <div class="card">
            <img src="${p.image}">
            <div class="name">${p.name}</div>
            <div class="val"><span>⭐ Normal</span><span>${p.values.normal}</span></div>
            <div class="val"><span>🌟 Golden</span><span>${p.values.golden}</span></div>
            <div class="val"><span>🌈 Rainbow</span><span>${p.values.rainbow}</span></div>
        </div>`;
    });
}

document.querySelectorAll(".cat").forEach(b=>{
    b.onclick=()=>{
        document.querySelectorAll(".cat").forEach(x=>x.classList.remove("active"));
        b.classList.add("active");
        cat=b.dataset.cat;
        render();
    };
});

search.oninput=render;
</script>

</body>
</html>
