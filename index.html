<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Simulator Values</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<!-- ICONS -->
<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" rel="stylesheet">

<style>
:root{
  --bg:#0b0e17;
  --panel:#14182a;
  --card:#1a1f36;
  --accent:#7c6cff;
  --text:#eef1ff;
  --muted:#9aa2c7;
}

*{box-sizing:border-box;font-family:Inter,Segoe UI,system-ui}

body{
  margin:0;
  background:radial-gradient(circle at top,#1b1f35,#0b0e17 65%);
  color:var(--text);
}

/* TOP BAR */
.topbar{
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:14px 24px;
  border-bottom:1px solid rgba(255,255,255,.06);
}
.logo{font-weight:700}
.nav a{
  color:#dfe3ff;
  margin:0 12px;
  text-decoration:none;
  font-size:14px;
}
.nav i{margin-right:6px}
.discord{
  background:#5865F2;
  padding:8px 14px;
  border-radius:10px;
  color:#fff;
  text-decoration:none;
  font-weight:600;
}
.discord i{margin-right:6px}

/* HERO */
.hero{
  text-align:center;
  padding:60px 20px 30px;
}
.hero h1{font-size:40px;margin:0}
.hero p{color:var(--muted);margin-top:8px}

/* TABS */
.tabs{
  display:flex;
  gap:10px;
  justify-content:center;
  flex-wrap:wrap;
  margin:25px 20px;
}
.tab{
  background:rgba(255,255,255,.08);
  padding:8px 18px;
  border-radius:999px;
  font-size:13px;
  cursor:pointer;
}
.tab.active{
  background:var(--accent);
  color:#000;
  font-weight:600;
}

/* SEARCH */
.search{
  max-width:680px;
  margin:0 auto 30px;
}
.search input{
  width:100%;
  padding:14px 18px;
  border-radius:14px;
  border:none;
  outline:none;
  background:#14182a;
  color:#fff;
}

/* GRID */
.grid{
  max-width:1300px;
  margin:auto;
  padding:0 20px 60px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

/* PET CARD */
.pet{
  background:linear-gradient(180deg,#1d223a,#15192d);
  border-radius:18px;
  padding:14px;
  box-shadow:0 15px 40px rgba(0,0,0,.5);
}
.pet img{
  width:100%;
  border-radius:14px;
}
.pet h3{
  text-align:center;
  margin:10px 0 8px;
  font-size:15px;
}
.meta{
  font-size:12px;
  color:var(--muted);
  line-height:1.6;
}

/* FOOTER */
footer{
  text-align:center;
  padding:30px;
  font-size:12px;
  color:#7f86b8;
}
</style>
</head>

<body>

<!-- TOP -->
<div class="topbar">
  <div class="logo">Tap Sim Values</div>
  <div class="nav">
    <a href="#"><i class="fa-solid fa-house"></i>Home</a>
    <a href="#"><i class="fa-solid fa-list"></i>Value List</a>
  </div>
  <a class="discord" href="https://discord.gg/tapsim" target="_blank">
    <i class="fa-brands fa-discord"></i>Discord
  </a>
</div>

<!-- HERO -->
<div class="hero">
  <h1>Tap Simulator Value List</h1>
  <p>Community driven Tap Simulator pet values.</p>
</div>

<!-- TABS -->
<div class="tabs" id="tabs">
  <div class="tab active" data-cat="all">All</div>
</div>

<!-- SEARCH -->
<div class="search">
  <input id="search" placeholder="Search pets...">
</div>

<!-- PET GRID -->
<div class="grid" id="grid"></div>

<footer>
  DISCLAIMER: Serials & mutations affect values drastically<br>
  O/C = Owners Choice • N/A = Not Available
</footer>

<script>
let pets=[];
let activeCategory="all";

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(data=>{
  pets=data;
  buildTabs();
  render();
});

function buildTabs(){
  const tabs=document.getElementById("tabs");
  const cats=[...new Set(pets.map(p=>p.category))];

  cats.forEach(c=>{
    const t=document.createElement("div");
    t.className="tab";
    t.textContent=formatCat(c);
    t.dataset.cat=c;
    t.onclick=()=>setCat(c,t);
    tabs.appendChild(t);
  });
}

function formatCat(c){
  return c
    .replace("secret1","Secret I")
    .replace("secret2","Secret II")
    .replace(/_/g," ")
    .toUpperCase();
}

function setCat(c,el){
  activeCategory=c;
  document.querySelectorAll(".tab").forEach(t=>t.classList.remove("active"));
  el.classList.add("active");
  render();
}

document.getElementById("search").oninput=render;

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  pets.filter(p=>{
    return (activeCategory==="all"||p.category===activeCategory)
      && p.name.toLowerCase().includes(q);
  }).forEach(p=>{
    grid.innerHTML+=`
      <div class="pet">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div class="meta">
          💎 Normal: ${p.values?.normal ?? "N/A"}<br>
          ⭐ Golden: ${p.values?.golden ?? "N/A"}<br>
          🌈 Rainbow: ${p.values?.rainbow ?? "N/A"}
        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
