<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tap Sim Values</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  background:#0b0d14;
  color:#fff;
  font-family:Inter,Segoe UI,system-ui;
}
.topbar{
  display:flex;
  justify-content:space-between;
  padding:14px 24px;
  border-bottom:1px solid rgba(255,255,255,.08);
}
.nav a{color:#ccc;margin:0 10px;text-decoration:none}
.hero{text-align:center;padding:50px 20px}
.tabs{display:flex;justify-content:center;gap:10px}
.tab{
  padding:8px 16px;
  background:#1b2140;
  border-radius:999px;
  cursor:pointer;
}
.tab.active{background:#7c6cff;color:#000;font-weight:700}
.search{max-width:600px;margin:20px auto}
.search input{
  width:100%;
  padding:14px;
  border-radius:12px;
  border:none;
  background:#151a2d;
  color:#fff;
}
.grid{
  max-width:1300px;
  margin:auto;
  padding:20px;
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:18px;
}
.pet{
  background:#151a2d;
  border-radius:16px;
  padding:14px;
}
.pet img{width:100%;border-radius:12px}
.pet h3{text-align:center;margin:10px 0}
.values{font-size:13px;line-height:1.6;color:#ddd}
section{display:none}
section.active{display:block}
</style>
</head>

<body>

<div class="topbar">
  <b>Tap Sim Values</b>
  <div class="nav">
    <a href="#" onclick="show('home')">🏠 Home</a>
    <a href="#" onclick="show('values')">📋 Value List</a>
  </div>
</div>

<section id="home" class="active">
  <div class="hero">
    <h1>Tap Simulator Value List</h1>
    <p>⚡ List Last Updated – 24/01/26</p>
  </div>
</section>

<section id="values">
  <div class="hero">
    <h1>Value List</h1>
  </div>

  <div class="tabs">
    <div class="tab active" data-cat="all">All</div>
    <div class="tab" data-cat="secret1">Secret I</div>
    <div class="tab" data-cat="secret2">Secret II</div>
  </div>

  <div class="search">
    <input id="search" placeholder="Search pets...">
  </div>

  <div class="grid" id="grid"></div>
</section>

<script>
let pets=[],current="all";

function show(id){
  document.querySelectorAll("section").forEach(s=>s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

fetch("https://asignas19-ui.github.io/value-list/pets.json?"+Date.now())
.then(r=>r.json())
.then(d=>{pets=d;render()});

document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    current=t.dataset.cat;
    render();
  }
});

document.getElementById("search").oninput=render;

function render(){
  const q=document.getElementById("search").value.toLowerCase();
  const grid=document.getElementById("grid");
  grid.innerHTML="";

  pets.filter(p=>{
    return (current==="all"||p.category===current)
      && p.name.toLowerCase().includes(q);
  }).forEach(p=>{
    const normal  = p.normal  ?? p.Normal  ?? p.value?.normal  ?? "N/A";
    const golden  = p.golden  ?? p.Golden  ?? p.value?.golden  ?? "N/A";
    const rainbow = p.rainbow ?? p.Rainbow ?? p.value?.rainbow ?? "N/A";

    grid.innerHTML+=`
      <div class="pet">
        <img src="${p.image}">
        <h3>${p.name}</h3>
        <div class="values">
          💎 Normal: ${normal}<br>
          ⭐ Golden: ${golden}<br>
          🌈 Rainbow: ${rainbow}
        </div>
      </div>
    `;
  });
}
</script>

</body>
</html>
