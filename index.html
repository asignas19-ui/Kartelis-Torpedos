<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tap Simulator Values</title>

<style>
*{box-sizing:border-box;font-family:Inter,system-ui,sans-serif}
body{
  margin:0;
  background:linear-gradient(180deg,#0b1228,#020617);
  color:#e5e7eb;
}
.wrapper{
  max-width:1200px;
  margin:auto;
  padding:20px;
}
header{
  text-align:center;
}
header h1{
  margin:0;
  font-size:30px;
}
.top-buttons{
  margin-top:12px;
  display:flex;
  justify-content:center;
  gap:12px;
}
.top-buttons button{
  background:#1e293b;
  border:none;
  color:#c7d2fe;
  padding:8px 18px;
  border-radius:999px;
  cursor:pointer;
}
.top-buttons button.active{
  background:#4f46e5;
  color:white;
}

.tabs{
  display:flex;
  justify-content:center;
  gap:10px;
  margin:20px 0;
}
.tabs button{
  background:#020617;
  border:none;
  color:#94a3b8;
  padding:6px 14px;
  border-radius:999px;
  cursor:pointer;
}
.tabs button.active{
  background:#1e293b;
  color:white;
}

.search{
  display:flex;
  justify-content:center;
  margin-bottom:20px;
}
.search input{
  width:320px;
  padding:8px 12px;
  border-radius:8px;
  border:none;
  background:#020617;
  color:white;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fill,minmax(220px,1fr));
  gap:20px;
}

.card{
  background:#020617;
  border-radius:14px;
  padding:12px;
}
.card img{
  width:100%;
  border-radius:12px;
}
.card h3{
  margin:10px 0 6px;
}
.values{
  font-size:13px;
  color:#cbd5f5;
  line-height:1.4;
}

.hidden{display:none}

/* HOME */
.section{
  background:#020617;
  border-radius:14px;
  padding:16px;
  margin-bottom:16px;
}
.section h3{
  margin:0 0 8px;
}
.section ul{
  margin:0;
  padding-left:18px;
}
.section li,p{
  font-size:14px;
  color:#cbd5f5;
}

.discord{
  text-align:center;
  margin-top:20px;
}
.discord a{
  color:#5865F2;
  text-decoration:none;
  font-weight:600;
}
</style>
</head>
<body>

<div class="wrapper">

<header>
  <h1>Tap Simulator Values</h1>
  <div class="top-buttons">
    <button class="nav active" data-page="home">🏠 Home</button>
    <button class="nav" data-page="pets">💎 Value List</button>
  </div>
</header>

<!-- HOME -->
<div id="home">
  <div class="section">
    <h3>📰 News</h3>
    <ul>
      <li>New pets added</li>
      <li>Values updated daily</li>
    </ul>
  </div>

  <div class="section">
    <h3>👑 Owners</h3>
    <ul><li>YourName</li></ul>
  </div>

  <div class="section">
    <h3>✏️ Editors</h3>
    <ul><li>Editor1</li><li>Editor2</li></ul>
  </div>

  <div class="section">
    <h3>⚠️ Disclaimer</h3>
    <p>All values are community based and may change.</p>
  </div>

  <div class="discord">
    <a href="https://discord.gg/">Join Discord</a>
  </div>
</div>

<!-- PETS -->
<div id="pets" class="hidden">

  <div class="tabs">
    <button class="tab active" data-cat="all">All</button>
    <button class="tab" data-cat="secret">Secret</button>
    <button class="tab" data-cat="exclusive">Exclusive</button>
    <button class="tab" data-cat="mythic">Mythic</button>
    <button class="tab" data-cat="limited">Limited</button>
  </div>

  <div class="search">
    <input type="text" id="search" placeholder="Search pet...">
  </div>

  <div class="grid" id="petGrid"></div>
</div>

</div>

<script>
const navs=document.querySelectorAll('.nav');
const home=document.getElementById('home');
const pets=document.getElementById('pets');

navs.forEach(b=>{
  b.onclick=()=>{
    navs.forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    if(b.dataset.page==='home'){home.classList.remove('hidden');pets.classList.add('hidden')}
    else{pets.classList.remove('hidden');home.classList.add('hidden')}
  }
});

const grid=document.getElementById('petGrid');
let allPets=[];

fetch('pets.json')
.then(r=>r.json())
.then(data=>{
  allPets=data;
  render(allPets);
});

function render(list){
  grid.innerHTML='';
  list.forEach(p=>{
    grid.innerHTML+=`
    <div class="card" data-cat="${p.category}">
      <img src="${p.image}">
      <h3>${p.name}</h3>
      <div class="values">
        💎 Normal: ${p.normal}<br>
        ✨ Golden: ${p.golden}<br>
        🌈 Rainbow: ${p.rainbow}
      </div>
    </div>`;
  });
}

document.getElementById('search').oninput=e=>{
  const v=e.target.value.toLowerCase();
  render(allPets.filter(p=>p.name.toLowerCase().includes(v)));
};

document.querySelectorAll('.tab').forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
    t.classList.add('active');
    const c=t.dataset.cat;
    render(c==='all'?allPets:allPets.filter(p=>p.category===c));
  }
});
</script>

</body>
</html>
